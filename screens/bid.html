<div id="bid-screen" class="screen">
  <h2>♠ Bid Phase</h2>
  <p id="bid-instr">Look at your 4 cards and choose a bid ≥ 9.</p>
  <div class="bid-hand" id="bid-hand-area"></div>
  <p id="bid-hint" style="color:#ffa040;font-size:.8rem;"></p>
  <div class="bid-btns" id="bid-btn-area"></div>
  <button class="btn btn-danger" onclick="exitGame()" style="margin-top:8px;padding:8px 24px;font-size:.9rem">Exit Game</button>
</div>
